<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DRONE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Page slide-in wrapper -->
  <div class="page" id="page">

    <!-- Logo -->
    <header class="logo-area">
      <h1 class="logo">
        DR<svg class="logo-prop" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="8" fill="white"/><path d="M50 42 C40 30, 20 25, 15 35 C10 45, 30 48, 50 42Z" fill="white"/><path d="M58 50 C70 40, 75 20, 65 15 C55 10, 52 30, 58 50Z" fill="white"/><path d="M50 58 C60 70, 80 75, 85 65 C90 55, 70 52, 50 58Z" fill="white"/><path d="M42 50 C30 60, 25 80, 35 85 C45 90, 48 70, 42 50Z" fill="white"/></svg>NE
      </h1>
    </header>

    <!-- 3 Drones -->
    <section class="drones">

      <article class="drone">
        <div class="drone-img">
          <img src="User added files/Drohne 1 Links Neu.png" alt="JAGU4R V2">
        </div>
        <h2 class="drone-name">JAGU4R V2</h2>
        <p class="drone-rank">#1 in Speed</p>
        <p class="drone-price">712&euro;</p>
        <button class="btn-config">KONFIGURIEREN</button>
      </article>

      <article class="drone drone-center">
        <div class="drone-img">
          <img src="User added files/Drohne 2 Mitte Neu.png" alt="ICEBREAKER">
        </div>
        <h2 class="drone-name">ICEBREAKER</h2>
        <p class="drone-rank">#1 in Preis/Leistung</p>
        <p class="drone-price">423&euro;</p>
        <button class="btn-config">KONFIGURIEREN</button>
      </article>

      <article class="drone">
        <div class="drone-img">
          <img src="User added files/Drohne 3 Rechts Neu.png" alt="LEAPFROGG4R">
        </div>
        <h2 class="drone-name">LEAPFROGG4R</h2>
        <p class="drone-rank">#1 in Flight-time</p>
        <p class="drone-price">863&euro;</p>
        <button class="btn-config">KONFIGURIEREN</button>
      </article>

    </section>

    <!-- Search at bottom -->
    <div class="search-area">
      <div class="search-wrapper">
        <input type="text" class="search-input" id="searchInput" placeholder="Suche..." autocomplete="off">
        <div class="search-dropdown" id="searchDropdown">
          <div class="dropdown-col">
            <span class="dropdown-heading">Kategorien</span>
            <a href="#">Frames</a>
            <a href="#">Motoren</a>
            <a href="#">Propeller</a>
            <a href="#">Akkus (LiPo)</a>
            <a href="#">Flight Controller</a>
            <a href="#">ESC</a>
          </div>
          <div class="dropdown-col">
            <span class="dropdown-heading">Drohnen</span>
            <a href="#">JAGU4R V2</a>
            <a href="#">ICEBREAKER</a>
            <a href="#">LEAPFROGG4R</a>
          </div>
          <div class="dropdown-col">
            <span class="dropdown-heading">Teile</span>
            <a href="#">FPV-Kameras</a>
            <a href="#">Video-Sender (VTX)</a>
            <a href="#">FPV-Brillen</a>
            <a href="#">Antennen</a>
            <a href="#">Empfaenger</a>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="js/main.js"></script>
</body>
</html>
